<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Gradient Fade Background</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #121212; 
        color: white;
        min-height: 200vh; 
      }

      .bg-fade {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          linear-gradient(to bottom, rgba(18, 18, 18, 0) 0%, rgba(18, 18, 18, 1) 100%),
          url('Screenshot\ 2026-04-18\ 215346.png');
        
        /* 1. Mengubah background-size agar gambar tidak 'over' atau terlalu besar */
        /* Menggunakan 'contain' atau persentase (misal 80%) membuat gambar lebih kecil */
        background-size: 90%; 
        
        background-position: center top; /* Gambar mulai dari tengah atas */
        background-repeat: no-repeat;

        /* 2. Menaikkan intensitas (Opacity diubah dari 0.75 ke 0.9 atau 1.0) */
        opacity: 0.95; 
      }

      .navbar {
        z-index: 10;
      }
    </style>
  </head>
  <body>
    
    <div class="bg-fade"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index1.html">Hobi</a></li>
            <li class="nav-item"><a class="nav-link active" href="index2.html">My Lover</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
