<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Gradient Fade Background</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        /* Warna dasar bagian bawah website */
        background-color: #121212; 
        color: white;
        /* Membuat halaman cukup panjang agar bisa di-scroll */
        min-height: 200vh; 
      }

      .bg-fade {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        /* Teknik Gradasi: Gambar di tumpuk dengan Linear Gradient */
        /* Gradasi dari transparan (atas) ke warna gelap (bawah) */
        background: 
          linear-gradient(to bottom, rgba(18, 18, 18, 0) 0%, rgba(18, 18, 18, 1) 100%),
          url('https://i.pinimg.com/736x/e8/33/69/e83369e3d64014aad91d754f0fa5936a.jpg');
        
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.75; /* Intensitas awal 75% sesuai permintaan sebelumnya */
      }

      .navbar {
        z-index: 10;
      }

      .content-section {
        padding: 100px 0;
      }
    </style>
  </head>
  <body>
    
    <div class="bg-fade"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index1.html">Hobi</a></li>
            <li class="nav-item"><a class="nav-link" href="index2.html">My Lover</a></li>
          </ul>
        </div>
      </div>
    </nav>
<div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-6 col-md-4">
          <img src="https://devhumor.com/content/uploads/images/May2024/python_is_easy.jpg" class="img-fluid rounded border border-secondary shadow" alt="Meme 1">
        </div>
        <div class="col-6 col-md-4">
          <img src="https://i.programmerhumor.io/2022/11/programmerhumor-io-python-memes-backend-memes-9e9f121c7260a56.jpg" class="img-fluid rounded border border-secondary shadow" alt="Meme 2">
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
